task:
  postgres:
    host: "localhost"
    port: 5432
    user: "casper"
    password: "casper"
    database: "casper"
    sslmode: "disable"

broker:
  url: "amqp://casper:casper@localhost:5672/"
  exchange: "tasks"
  prefetch: 10

scheduler:
  poll_interval_ms: 1000
  batch_size: 50
  jitter_max_ms: 5000
  visibility_timeout_ms: 300000
  cleanup_interval_ms: 30000
  shutdown_drain_timeout_ms: 10000
  age_bonus_per_hour: 0.0

worker:
  concurrency: 5
  queue_name: "tasks.high"
  priority_weights:
    high: 60
    medium: 30
    low: 10

api:
  port: "8080"
  read_timeout_in_second: 5
  write_timeout_in_second: 35
  idle_timeout_in_second: 120

metrics:
  port: "9090"
