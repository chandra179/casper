global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: casper-scheduler
    static_configs:
      - targets: ["host.docker.internal:9090"]

  - job_name: casper-worker
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: casper-api
    static_configs:
      - targets: ["host.docker.internal:9092"]
